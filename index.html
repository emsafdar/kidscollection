<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LittleSummer · Kids' Store</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Google Font (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container" id="app">
    <!-- ===== HEADER ===== -->
    <header class="main-header">
      <div class="logo">
        <h1>☀️ LittleSummer <span>kids</span></h1>
      </div>
      <div class="header-actions">
        <button class="cart-btn" id="cartToggleBtn" aria-label="Open cart">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-badge" id="cartCountBadge">0</span>
        </button>
      </div>
    </header>

    <!-- ===== COD BADGE ===== -->
    <div class="cod-banner">
      <i class="fas fa-truck"></i> Cash on Delivery · Free shipping 
      <i class="fas fa-check-circle" style="margin-left: 8px; color: #1f8a6b;"></i>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <main id="mainContent">
      <!-- Products grid (rendered by JS) -->
      <section class="products-section" id="productsSection">
        <div class="section-header">
          <h2>Summer collection</h2>
          <p>👕 T-shirts · Jeans · Trousers</p>
        </div>
        <div class="products-grid" id="productGrid"></div>
      </section>

      <!-- Product detail panel (hidden by default) -->
      <section class="detail-panel" id="detailPanel" style="display: none;">
        <button class="back-btn" id="backFromDetail"><i class="fas fa-arrow-left"></i> Back</button>
        <div class="detail-container" id="detailContainer"></div>
      </section>

      <!-- Order / checkout panel (hidden by default) -->
      <section class="order-panel" id="orderPanel" style="display: none;">
        <button class="back-btn" id="backFromOrder"><i class="fas fa-arrow-left"></i> Back to cart</button>
        <div class="order-container">
          <h2><i class="fas fa-clipboard-list"></i> Complete your order</h2>
          <p class="order-sub">Pay with Cash on Delivery — fill in your details</p>
          <form id="orderForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="fullName">Full name *</label>
                <input type="text" id="fullName" placeholder="e.g. Sara Ahmed" required />
                <span class="error-msg" id="nameError"></span>
              </div>
              <div class="form-group">
                <label for="phone">Phone number *</label>
                <input type="tel" id="phone" placeholder="03xx-xxxxxxx" required />
                <span class="error-msg" id="phoneError"></span>
              </div>
            </div>
            <div class="form-group">
              <label for="address">Delivery address *</label>
              <input type="text" id="address" placeholder="Street, house, city" required />
              <span class="error-msg" id="addressError"></span>
            </div>
            <div class="form-group">
              <label for="orderNotes">Notes (optional)</label>
              <textarea id="orderNotes" rows="2" placeholder="Any special instructions..."></textarea>
            </div>
            <div class="order-summary" id="orderSummary">
              <span>Total: <strong id="orderTotalDisplay">₨ 0</strong></span>
              <span class="cod-tag-form"><i class="fas fa-hand-holding-usd"></i> Cash on delivery</span>
            </div>
            <button type="submit" class="place-order-btn" id="placeOrderBtn">
              <i class="fas fa-check-circle"></i> Place order (COD)
            </button>
          </form>
        </div>
      </section>
    </main>

    <!-- ===== CART SIDEBAR ===== -->
    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3><i class="fas fa-shopping-cart"></i> Your cart</h3>
        <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
      </div>
      <div class="cart-items" id="cartItemsList">
        <div class="empty-cart-msg">🛒 Cart is empty</div>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <span id="cartTotalPrice">₨ 0</span>
        </div>
        <div class="cart-actions">
          <button class="clear-cart-btn" id="clearCartBtn"><i class="fas fa-trash-alt"></i> Clear</button>
          <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-credit-card"></i> Checkout</button>
        </div>
      </div>
    </aside>

    <!-- ===== TOAST ===== -->
    <div id="toast" class="toast"></div>
  </div>

  <!-- ===== SEPARATE JS ===== -->
  <script src="script.js"></script>
</body>
</html>
